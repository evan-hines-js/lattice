apiVersion: lattice.dev/v1alpha1
kind: CedarPolicy
metadata:
  name: sonarr-security
  namespace: lattice-system
spec:
  description: Allow sonarr security overrides for linuxserver.io image
  policies: |
    permit(
      principal == Lattice::Service::"media/sonarr",
      action == Lattice::Action::"OverrideSecurity",
      resource == Lattice::SecurityOverride::"capability:SETUID"
    );
    permit(
      principal == Lattice::Service::"media/sonarr",
      action == Lattice::Action::"OverrideSecurity",
      resource == Lattice::SecurityOverride::"capability:SETGID"
    );
    permit(
      principal == Lattice::Service::"media/sonarr",
      action == Lattice::Action::"OverrideSecurity",
      resource == Lattice::SecurityOverride::"capability:CHOWN"
    );
    permit(
      principal == Lattice::Service::"media/sonarr",
      action == Lattice::Action::"OverrideSecurity",
      resource == Lattice::SecurityOverride::"capability:DAC_OVERRIDE"
    );
    permit(
      principal == Lattice::Service::"media/sonarr",
      action == Lattice::Action::"OverrideSecurity",
      resource == Lattice::SecurityOverride::"capability:FOWNER"
    );
    permit(
      principal == Lattice::Service::"media/sonarr",
      action == Lattice::Action::"OverrideSecurity",
      resource == Lattice::SecurityOverride::"runAsRoot"
    );
    permit(
      principal == Lattice::Service::"media/sonarr",
      action == Lattice::Action::"OverrideSecurity",
      resource == Lattice::SecurityOverride::"readWriteRootFilesystem"
    );
    permit(
      principal == Lattice::Service::"media/sonarr",
      action == Lattice::Action::"OverrideSecurity",
      resource == Lattice::SecurityOverride::"apparmor:Unconfined"
    );
    permit(
      principal == Lattice::Service::"media/sonarr",
      action == Lattice::Action::"OverrideSecurity",
      resource == Lattice::SecurityOverride::"allowedBinary:*"
    );
    permit(
      principal == Lattice::Service::"media/sonarr",
      action == Lattice::Action::"AccessExternalEndpoint",
      resource == Lattice::ExternalEndpoint::"api.nzbgeek.info:443"
    );
    permit(
      principal == Lattice::Service::"media/sonarr",
      action == Lattice::Action::"AccessExternalEndpoint",
      resource == Lattice::ExternalEndpoint::"services.sonarr.tv:443"
    );
    permit(
      principal == Lattice::Service::"media/sonarr",
      action == Lattice::Action::"AccessExternalEndpoint",
      resource == Lattice::ExternalEndpoint::"skyhook.sonarr.tv:443"
    );
    permit(
      principal == Lattice::Service::"media/sonarr",
      action == Lattice::Action::"AccessExternalEndpoint",
      resource == Lattice::ExternalEndpoint::"artworks.thetvdb.com:443"
    );
---
apiVersion: lattice.dev/v1alpha1
kind: LatticeService
metadata:
  name: sonarr
  namespace: media
spec:
  workload:
    containers:
      main:
        image: docker.io/linuxserver/sonarr:latest
        security:
          runAsUser: 0
          readOnlyRootFilesystem: false
          apparmorProfile: Unconfined
          capabilities: [CHOWN, DAC_OVERRIDE, FOWNER, SETUID, SETGID]
          allowedBinaries: ["*"]
        variables:
          PUID: "1000"
          PGID: "1000"
          TZ: "America/New_York"
        volumes:
          /config:
            source: ${resources.config}
          /downloads:
            source: ${resources.media-storage}
            path: downloads
          /tv:
            source: ${resources.media-storage}
            path: tv
          /tmp: {}
          /run: {}
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 1000m
            memory: 1Gi
        readinessProbe:
          httpGet:
            path: /ping
            port: 8989
    service:
      ports:
        http:
          port: 8989
          protocol: TCP
    resources:
      config:
        type: volume
        params:
          size: 5Gi
      # Shared media storage (REFERENCE - no size, authorized via jellyfin's allowedConsumers)
      media-storage:
        type: volume
        id: media-storage
      # Service dependencies (bilateral agreements)
      nzbget:
        type: service
        direction: outbound
      prowlarr:
        type: service
        direction: inbound
      nzbgeek:
        type: external-service
        direction: outbound
        params:
          endpoints:
            https: api.nzbgeek.info:443
      sonarr-cloud:
        type: external-service
        direction: outbound
        params:
          endpoints:
            services: services.sonarr.tv:443
            skyhook: skyhook.sonarr.tv:443
            artworks: artworks.thetvdb.com:443
  replicas: 1
  # Mesh-internal only: callers (e.g. jellyfin) reach sonarr via the in-cluster
  # FQDN over Istio multicluster. No public hostname, no gateway, no edge proxy.
  advertise:
    allowedServices: ["*"]
