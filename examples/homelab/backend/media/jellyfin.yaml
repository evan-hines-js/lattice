apiVersion: lattice.dev/v1alpha1
kind: CedarPolicy
metadata:
  name: jellyfin-security
  namespace: lattice-system
spec:
  description: Allow jellyfin security overrides for linuxserver.io image
  policies: |
    permit(
      principal == Lattice::Service::"media/jellyfin",
      action == Lattice::Action::"OverrideSecurity",
      resource == Lattice::SecurityOverride::"runAsRoot"
    );
    permit(
      principal == Lattice::Service::"media/jellyfin",
      action == Lattice::Action::"OverrideSecurity",
      resource == Lattice::SecurityOverride::"apparmor:Unconfined"
    );
    permit(
      principal == Lattice::Service::"media/jellyfin",
      action == Lattice::Action::"OverrideSecurity",
      resource == Lattice::SecurityOverride::"allowedBinary:*"
    );
    permit(
      principal == Lattice::Service::"media/jellyfin",
      action == Lattice::Action::"AccessExternalEndpoint",
      resource == Lattice::ExternalEndpoint::"api.themoviedb.org:443"
    );
    permit(
      principal == Lattice::Service::"media/jellyfin",
      action == Lattice::Action::"AccessExternalEndpoint",
      resource == Lattice::ExternalEndpoint::"image.tmdb.org:443"
    );
    permit(
      principal == Lattice::Service::"media/jellyfin",
      action == Lattice::Action::"AccessExternalEndpoint",
      resource == Lattice::ExternalEndpoint::"www.omdbapi.com:443"
    );
---
apiVersion: lattice.dev/v1alpha1
kind: LatticeService
metadata:
  name: jellyfin
  namespace: media
spec:
  workload:
    containers:
      main:
        image: docker.io/jellyfin/jellyfin:latest
        security:
          runAsUser: 0
          apparmorProfile: Unconfined
          allowedBinaries: ["*"]
        variables:
          JELLYFIN_PublishedServerUrl: "http://jellyfin.media.svc.cluster.local:8096"
        volumes:
          /config:
            source: ${resources.config}
          /cache:
            source: ${resources.cache}
          /media:
            source: ${resources.media-storage}
          /tmp: {}
        resources:
          requests:
            cpu: 500m
            memory: 1Gi
          limits:
            cpu: 4000m
            memory: 8Gi
        readinessProbe:
          httpGet:
            path: /health
            port: 8096
    service:
      # Only jellyfin needs serviceType=LoadBalancer (everyone else stays
      # ClusterIP). The reason is the istio HBONE wedge — see the trade-off
      # comment below the spec. The route reconciler resolves this Service's
      # LB VIP into ClusterRoute.address; haproxy-fw's route-adapter looks up
      # this service by name (matching the first label of the public hostname
      # listed in haproxy-fw's ingress) and renders a direct backend pointing
      # at the LB VIP.
      serviceType: LoadBalancer
      ports:
        http:
          port: 8096
          protocol: TCP
    resources:
      config:
        type: volume
        params:
          size: 10Gi
      cache:
        type: volume
        params:
          size: 20Gi
      # Shared media storage (OWNER - defines size and access policy)
      media-storage:
        type: volume
        id: media-storage
        params:
          size: 100Gi
          accessMode: ReadWriteOnce
          allowedConsumers:
            - sonarr
            - radarr
            - nzbget
      metadata-providers:
        type: external-service
        direction: outbound
        params:
          endpoints:
            tmdb-api: api.themoviedb.org:443
            tmdb-images: image.tmdb.org:443
            omdb: www.omdbapi.com:443
  replicas: 1
  advertise:
    allowedServices: ["*"]
  # serviceType: LoadBalancer instead of an istio gateway path.
  #
  # End-to-end path: the route reconciler resolves the LB Service VIP into
  # ClusterRoute.address; the cluster-routes controller auto-emits a
  # CiliumClusterwideNetworkPolicy on every cluster that has a stub for this
  # service, allowing the workloads listed in `advertise.allowedServices` to
  # reach the LB VIP. edge/haproxy-fw's route-adapter writes a literal
  # `server gw <ip>:<port>` into haproxy.cfg, so haproxy reaches this pod
  # over plain TCP via Cilium BGP-advertised VIP — no istio gateway envoy
  # in the data path.
  #
  # Why: jellyfin's seek-driven Range churn wedges every istio gateway envoy
  # in the path (backend gateway + east-west gateway), via
  # RST_STREAM(INTERNAL_ERROR) mid-stream and a leaked accounting slot in the
  # HBONE upstream pool. Reproduces on Istio 1.29.2 and 1.30.0-beta.0 ambient.
  # See istio-hbone-wedge-repro for the minimal reproducer.
  #
  # Trade-off: opts jellyfin out of L7 AuthorizationPolicy on inbound traffic
  # to the pod. Cilium L4 NetworkPolicy from bilateral-agreement still applies.
