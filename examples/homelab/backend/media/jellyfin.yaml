apiVersion: lattice.dev/v1alpha1
kind: CedarPolicy
metadata:
  name: jellyfin-security
  namespace: lattice-system
spec:
  description: Allow jellyfin security overrides for linuxserver.io image
  policies: |
    permit(
      principal == Lattice::Service::"media/jellyfin",
      action == Lattice::Action::"OverrideSecurity",
      resource == Lattice::SecurityOverride::"runAsRoot"
    );
    permit(
      principal == Lattice::Service::"media/jellyfin",
      action == Lattice::Action::"OverrideSecurity",
      resource == Lattice::SecurityOverride::"apparmor:Unconfined"
    );
    permit(
      principal == Lattice::Service::"media/jellyfin",
      action == Lattice::Action::"OverrideSecurity",
      resource == Lattice::SecurityOverride::"allowedBinary:*"
    );
---
apiVersion: lattice.dev/v1alpha1
kind: LatticeService
metadata:
  name: jellyfin
  namespace: media
spec:
  workload:
    containers:
      main:
        image: docker.io/jellyfin/jellyfin:latest
        security:
          runAsUser: 0
          apparmorProfile: Unconfined
          allowedBinaries: ["*"]
        variables:
          JELLYFIN_PublishedServerUrl: "http://jellyfin.media.svc.cluster.local:8096"
        volumes:
          /config:
            source: ${resources.config}
          /cache:
            source: ${resources.cache}
          /media:
            source: ${resources.media-storage}
            path: library
          /tmp: {}
        resources:
          requests:
            cpu: 500m
            memory: 1Gi
          limits:
            cpu: 4000m
            memory: 8Gi
        readinessProbe:
          httpGet:
            path: /health
            port: 8096
    service:
      serviceType: LoadBalancer
      ports:
        http:
          port: 8096
          protocol: TCP
    resources:
      config:
        type: volume
        params:
          size: 10Gi
      cache:
        type: volume
        params:
          size: 20Gi
      # Shared media storage (OWNER - defines size and access policy)
      media-storage:
        type: volume
        id: media-storage
        params:
          size: 100Gi
          accessMode: ReadWriteOnce
          allowedConsumers:
            - sonarr
            - nzbget
      sonarr:
        type: service
        direction: inbound
  replicas: 1
  advertise:
    allowedServices: ["*"]
  # serviceType: LoadBalancer instead of an istio gateway path.
  #
  # The route reconciler resolves the LB Service VIP into ClusterRoute.address;
  # edge/haproxy-fw's route-adapter writes a literal "server gw <ip>:<port>"
  # into haproxy.cfg, so haproxy reaches this pod over plain TCP via Cilium
  # BGP-advertised VIP — no istio gateway envoy in the data path.
  #
  # Why: jellyfin's seek-driven Range churn wedges every istio gateway envoy
  # in the path (backend gateway + east-west gateway), via RST_STREAM(INTERNAL_ERROR)
  # mid-stream and a leaked accounting slot in the HBONE upstream pool.
  # Reproduces on Istio 1.29.2 and 1.30.0-beta.0 ambient.
  # See istio-hbone-wedge-repro for the minimal reproducer.
  #
  # Trade-off: opts jellyfin out of L7 AuthorizationPolicy on inbound traffic
  # to the pod. Cilium L4 NetworkPolicy from bilateral-agreement still applies.
