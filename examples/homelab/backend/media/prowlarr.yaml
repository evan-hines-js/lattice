apiVersion: lattice.dev/v1alpha1
kind: CedarPolicy
metadata:
  name: prowlarr-security
  namespace: lattice-system
spec:
  description: Allow prowlarr security overrides for linuxserver.io image
  policies: |
    permit(
      principal == Lattice::Service::"media/prowlarr",
      action == Lattice::Action::"OverrideSecurity",
      resource == Lattice::SecurityOverride::"capability:SETUID"
    );
    permit(
      principal == Lattice::Service::"media/prowlarr",
      action == Lattice::Action::"OverrideSecurity",
      resource == Lattice::SecurityOverride::"capability:SETGID"
    );
    permit(
      principal == Lattice::Service::"media/prowlarr",
      action == Lattice::Action::"OverrideSecurity",
      resource == Lattice::SecurityOverride::"capability:CHOWN"
    );
    permit(
      principal == Lattice::Service::"media/prowlarr",
      action == Lattice::Action::"OverrideSecurity",
      resource == Lattice::SecurityOverride::"capability:DAC_OVERRIDE"
    );
    permit(
      principal == Lattice::Service::"media/prowlarr",
      action == Lattice::Action::"OverrideSecurity",
      resource == Lattice::SecurityOverride::"capability:FOWNER"
    );
    permit(
      principal == Lattice::Service::"media/prowlarr",
      action == Lattice::Action::"OverrideSecurity",
      resource == Lattice::SecurityOverride::"runAsRoot"
    );
    permit(
      principal == Lattice::Service::"media/prowlarr",
      action == Lattice::Action::"OverrideSecurity",
      resource == Lattice::SecurityOverride::"readWriteRootFilesystem"
    );
    permit(
      principal == Lattice::Service::"media/prowlarr",
      action == Lattice::Action::"OverrideSecurity",
      resource == Lattice::SecurityOverride::"apparmor:Unconfined"
    );
    permit(
      principal == Lattice::Service::"media/prowlarr",
      action == Lattice::Action::"OverrideSecurity",
      resource == Lattice::SecurityOverride::"allowedBinary:*"
    );
    permit(
      principal == Lattice::Service::"media/prowlarr",
      action == Lattice::Action::"AccessExternalEndpoint",
      resource == Lattice::ExternalEndpoint::"api.nzbgeek.info:443"
    );
    permit(
      principal == Lattice::Service::"media/prowlarr",
      action == Lattice::Action::"AccessExternalEndpoint",
      resource == Lattice::ExternalEndpoint::"prowlarr.servarr.com:443"
    );
    permit(
      principal == Lattice::Service::"media/prowlarr",
      action == Lattice::Action::"AccessExternalEndpoint",
      resource == Lattice::ExternalEndpoint::"indexers.prowlarr.com:443"
    );
---
apiVersion: lattice.dev/v1alpha1
kind: LatticeService
metadata:
  name: prowlarr
  namespace: media
spec:
  workload:
    containers:
      main:
        image: docker.io/linuxserver/prowlarr:latest
        security:
          runAsUser: 0
          readOnlyRootFilesystem: false
          apparmorProfile: Unconfined
          capabilities: [CHOWN, DAC_OVERRIDE, FOWNER, SETUID, SETGID]
          allowedBinaries: ["*"]
        variables:
          PUID: "1000"
          PGID: "1000"
          TZ: "America/New_York"
        volumes:
          /config:
            source: ${resources.config}
          /tmp: {}
          /run: {}
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 1000m
            memory: 1Gi
        readinessProbe:
          httpGet:
            path: /ping
            port: 9696
    service:
      ports:
        http:
          port: 9696
          protocol: TCP
    resources:
      config:
        type: volume
        params:
          size: 2Gi
      sonarr:
        type: service
        direction: outbound
      radarr:
        type: service
        direction: outbound
      nzbgeek:
        type: external-service
        direction: outbound
        params:
          endpoints:
            https: api.nzbgeek.info:443
      prowlarr-cloud:
        type: external-service
        direction: outbound
        params:
          endpoints:
            servarr: prowlarr.servarr.com:443
            indexers: indexers.prowlarr.com:443
  replicas: 1
  # Mesh-internal only: callers reach prowlarr via the in-cluster FQDN over
  # Istio multicluster. haproxy-fw fronts the public hostname (see service.hostnames).
  advertise:
    allowedServices: ["*"]
