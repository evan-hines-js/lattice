# Backend cluster - runs all workloads behind the edge firewall (Child)
apiVersion: lattice.dev/v1alpha1
kind: LatticeCluster
metadata:
  name: backend
  labels:
    lattice.dev/environment: homelab
    lattice.dev/role: backend
spec:
  latticeImage: "ghcr.io/evan-hines-js/lattice:latest"
  monitoring:
    enabled: false
  backups:
    enabled: false
  storage: true
  providerRef: basis
  provider:
    kubernetes:
      version: "1.32.0"
      bootstrap: rke2
    config:
      basis:
        # Backend is reached only via the edge HAProxy. Use the
        # cell-internal pool so its apiserver VIP and Cilium LB block
        # are not advertised to LAN — east-west reachability between
        # edge and backend is enough.
        externalIpPool: cell-internal
  registryMirrors:
    - upstream: docker.io
      mirror: "http://10.0.0.17:5555"
    - upstream: ghcr.io
      mirror: "http://10.0.0.17:5556"
  nodes:
    controlPlane:
      replicas: 3
      # Soft pin to the enterprise-PLP-SSD host so etcd's fsync hits
      # the fast path. Falls back if tier=fast has no capacity.
      placement:
        prefers:
          - key: tier
            value: fast
            weight: 100
      instanceType:
        cores: 8
        memoryGib: 32
        diskGib: 50
    workerPools:
      default:
        # Two workers, both pinned to tier=fast storage. Until the
        # incoming 800 GB drives are installed, only node-2 has a
        # tier=fast data pool (`basis-fast-pve`, 340 GiB), so both
        # OSDs land on that one device. Ceph runs size=2 min_size=1;
        # CRUSH `failure-domain: osd` is required (host fd would
        # refuse to place two OSDs on the one host). The 150 GiB disk
        # size leaves 40 GiB headroom on the 340 GiB device after
        # both reservations (2×150=300). Bump back to 175 GiB and
        # add `node-3` (or split fast across multiple devices) once
        # the new drives land.
        replicas: 2
        instanceType:
          cores: 12
          memoryGib: 64
          diskGib: 250
          # Raw block device for the OSD, presented as /dev/vdc.
          # Rook's CephCluster claims it via deviceFilter `^vd[c-z]$`.
          # selector pins to tier=fast pools, which today exists only
          # on node-2 — that's the host the workers end up on.
          dataDisks:
            - sizeGib: 150
              purpose: replicated
              selector:
                requires:
                  - key: tier
                    values: [fast]
  services: true
