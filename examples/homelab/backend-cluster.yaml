# Backend cluster - runs all workloads behind the edge firewall (Child)
apiVersion: lattice.dev/v1alpha1
kind: LatticeCluster
metadata:
  name: backend
  labels:
    lattice.dev/environment: homelab
    lattice.dev/role: backend
spec:
  latticeImage: "ghcr.io/evan-hines-js/lattice:latest"
  monitoring:
    enabled: false
  backups:
    enabled: false
  storage: true
  providerRef: basis
  provider:
    kubernetes:
      version: "1.32.0"
      bootstrap: rke2
    config:
      basis:
        # Backend is reached only via the edge HAProxy. Use the
        # cell-internal pool so its apiserver VIP and Cilium LB block
        # are not advertised to LAN — east-west reachability between
        # edge and backend is enough.
        externalIpPool: cell-internal
  registryMirrors:
    - upstream: docker.io
      mirror: "http://10.0.0.131:5555"
    - upstream: ghcr.io
      mirror: "http://10.0.0.131:5556"
  nodes:
    controlPlane:
      replicas: 3
      # Soft pin to the enterprise-PLP-SSD host so etcd's fsync hits
      # the fast path. Falls back if tier=fast has no capacity.
      placement:
        prefers:
          - key: tier
            value: fast
            weight: 100
      instanceType:
        cores: 8
        memoryGib: 32
        diskGib: 50
    workerPools:
      default:
        replicas: 3
        # Workers prefer the cheaper-disk host so the CP host doesn't
        # get crowded out under churn.
        placement:
          prefers:
            - key: tier
              value: slow
              weight: 100
        instanceType:
          cores: 12
          memoryGib: 64
          diskGib: 250
          # 175 GiB raw block device per worker, presented as /dev/vdc
          # by Basis. Rook's CephCluster claims it via the deviceFilter
          # `^vd[c-z]$`, so each worker contributes one OSD.
          # purpose=replicated activates basis's same-cluster anti-
          # affinity so Ceph replicas land on different drives.
          dataDisks:
            - sizeGib: 175
              purpose: replicated
  services: true
