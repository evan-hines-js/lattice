# Edge cluster - HAProxy firewall/DMZ layer (Parent)
# Install with: lattice install -f edge-cluster.yaml
apiVersion: lattice.dev/v1alpha1
kind: LatticeCluster
metadata:
  name: edge
  labels:
    lattice.dev/environment: homelab
    lattice.dev/role: edge
spec:
  latticeImage: "ghcr.io/evan-hines-js/lattice:latest"
  monitoring:
    enabled: false
  backups:
    enabled: false
  providerRef: basis
  provider:
    kubernetes:
      version: "1.32.0"
      bootstrap: kubeadm
    config:
      basis:
        # Edge sits at the LAN boundary — apiserver VIP and the Cilium
        # LoadBalancer block (which fronts haproxy-fw) come from a pool
        # that's reachable from LAN clients.
        externalIpPool: cell-public
  registryMirrors:
    - upstream: docker.io
      mirror: "http://10.0.0.131:5555"
    - upstream: ghcr.io
      mirror: "http://10.0.0.131:5556"
  nodes:
    controlPlane:
      replicas: 3
      # Soft pin to the enterprise-PLP-SSD host so etcd's fsync hits
      # the fast path. Falls back if tier=fast has no capacity.
      placement:
        prefers:
          - key: tier
            value: fast
            weight: 100
      instanceType:
        cores: 8
        memoryGib: 16
        diskGib: 50
    workerPools:
      default:
        replicas: 2
        # Workers prefer the cheaper-disk host so the CP host doesn't
        # get crowded out under churn.
        placement:
          prefers:
            - key: tier
              value: slow
              weight: 100
        instanceType:
          cores: 8
          memoryGib: 32
          diskGib: 100
  services: true
  parentConfig:
    grpcPort: 50051
    bootstrapPort: 8443
    service:
      type: LoadBalancer
---
# InfraProvider referenced by spec.providerRef above.
# `credentials.id: basis-credentials` points at the Secret the installer seeds
# from BASIS_CONTROLLER_URL / BASIS_CLIENT_CERT / BASIS_CLIENT_KEY / BASIS_CA_CERT.
# Replace serverUrl with your Basis controller's gRPC endpoint.
apiVersion: lattice.dev/v1alpha1
kind: InfraProvider
metadata:
  name: basis
  namespace: lattice-system
spec:
  type: basis
  credentials:
    id: basis-credentials
    provider: lattice-local
  basis:
    serverUrl: "https://10.0.0.206:7443"
  imagePullSecrets:
    - name: default
---
apiVersion: lattice.dev/v1alpha1
kind: ImageProvider
metadata:
  name: default
  namespace: lattice-system
spec:
  type: ghcr
  registry: ghcr.io
  credentials:
    id: image-registry-credentials
    provider: lattice-local
