# Pi-hole DNSProvider for the homelab
#
# The operator deploys an external-dns Deployment per DNSProvider in
# `lattice-system`. external-dns watches Gateway API HTTPRoutes/GRPCRoutes
# and publishes one A record per hostname to Pi-hole's customdns API,
# pointing at the parent Gateway's LoadBalancer IP. No `/etc/hosts` edits.
#
# Adjust `pihole.url` to your Pi-hole's address and the secret password
# to your Pi-hole web password before applying.
apiVersion: v1
kind: Secret
metadata:
  name: pihole-credentials
  namespace: lattice-secrets
  labels:
    lattice.dev/secret-source: "true"
type: Opaque
stringData:
  EXTERNAL_DNS_PIHOLE_PASSWORD: "lattice"
---
apiVersion: lattice.dev/v1alpha1
kind: DNSProvider
metadata:
  name: pihole-home
  namespace: lattice-system
spec:
  type: pihole
  zone: home.arpa
  # CoreDNS forwards `home.arpa` queries here so in-cluster pods can
  # resolve sibling services by their published hostnames.
  resolver: "10.0.0.131:53"
  credentials:
    id: pihole-credentials
    provider: lattice-local
    keys:
      - EXTERNAL_DNS_PIHOLE_PASSWORD
  pihole:
    url: "http://10.0.0.131:8053"
