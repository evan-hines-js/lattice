# Cedar policy: allow haproxy-fw shared PID namespace and SA token
apiVersion: lattice.dev/v1alpha1
kind: CedarPolicy
metadata:
  name: haproxy-fw-security
  namespace: lattice-system
spec:
  description: Allow haproxy-fw shared PID namespace and SA token for sidecar K8s API access
  policies: |
    permit(
      principal == Lattice::Service::"edge/haproxy-fw",
      action == Lattice::Action::"OverrideSecurity",
      resource == Lattice::SecurityOverride::"shareProcessNamespace"
    );
    permit(
      principal == Lattice::Service::"edge/haproxy-fw",
      action == Lattice::Action::"OverrideSecurity",
      resource == Lattice::SecurityOverride::"automountServiceAccountToken"
    );
---
# RBAC: allow haproxy-fw SA to watch LatticeClusterRoutes CRDs
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: lattice-route-watcher
rules:
  - apiGroups: ["lattice.dev"]
    resources: ["latticeclusterroutes"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: haproxy-fw-route-watcher
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: lattice-route-watcher
subjects:
  - kind: ServiceAccount
    name: haproxy-fw
    namespace: edge
---
# HAProxy firewall - single entry point for all traffic into the backend cluster
#
# The route-adapter sidecar watches LatticeClusterRoutes CRDs, renders
# haproxy.cfg when routes change, and sends SIGUSR2 to reload HAProxy.
# No manual IP management needed — routes are discovered from heartbeats.
apiVersion: lattice.dev/v1alpha1
kind: LatticeService
metadata:
  name: haproxy-fw
  namespace: edge
spec:
  replicas: 2
  workload:
    containers:
      main:
        image: haproxy:lts-alpine
        command: ["/usr/local/sbin/haproxy", "-W", "-f", "/config/haproxy.cfg"]
        volumes:
          /config:
            source: ${resources.haproxy-config}
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 1000m
            memory: 512Mi
        readinessProbe:
          httpGet:
            path: /healthz
            port: 8405
          initialDelaySeconds: 5
          periodSeconds: 10
        security:
          runAsUser: 1000
    service:
      ports:
        http:
          port: 80
          targetPort: 8080
          protocol: TCP
        stats:
          port: 8405
          protocol: TCP
    resources:
      haproxy-config:
        type: volume
        params:
          size: 50Mi
  sidecars:
    route-adapter:
      image: "ghcr.io/evan-hines-js/lattice-route-adapter:latest"
      command: ["/usr/local/bin/lattice-route-adapter"]
      variables:
        CONFIG_PATH: "/config/haproxy.cfg"
        HAPROXY_PROCESS_NAME: "haproxy"
      volumes:
        /config:
          source: ${resources.haproxy-config}
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          cpu: 200m
          memory: 128Mi
      security:
        runAsUser: 1000
  shareProcessNamespace: true
  automountServiceAccountToken: true
  ingress:
    routes:
      http:
        kind: HTTPRoute
        port: http
        hosts:
          - "*.home.arpa"
