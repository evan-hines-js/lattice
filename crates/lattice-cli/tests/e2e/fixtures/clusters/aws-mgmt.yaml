# AWS management cluster for E2E testing
# Uses CAPA (Cluster API Provider AWS) with NLB and BYOI
apiVersion: lattice.dev/v1alpha1
kind: LatticeCluster
metadata:
  name: e2e-mgmt
spec:
  latticeImage: "ghcr.io/evan-hines-js/lattice:latest"
  monitoring:
    enabled: true
    ha: false
  backups:
    enabled: false
  providerRef: aws
  provider:
    kubernetes:
      version: "1.32.0"
      bootstrap: kubeadm
      certSANs:
        - "127.0.0.1"
        - "localhost"
    config:
      aws:
        region: "us-west-2"
        sshKeyName: "lattice-e2e"
        # BYOI: share VPC/subnets across clusters
        vpcId: "vpc-02334e828aa108521"
        subnetIds:
          # Private subnets (for nodes)
          - "subnet-0baada5edd89b23c1"
          - "subnet-0b0d0d0ff4909e119"
          - "subnet-0d4feb8582c12782d"
          # Public subnets (for load balancers)
          - "subnet-0482c8a493e96c631"
          - "subnet-08cb587698200615b"
          - "subnet-002e2a39388d962c9"
  nodes:
    controlPlane:
      replicas: 1
      instanceType:
        name: m7i-flex.large
      rootVolume:
        sizeGb: 50
        type: "gp3"
    workerPools:
      default:
        replicas: 1
        instanceType:
          name: t3.small
        rootVolume:
          sizeGb: 50
          type: "gp3"
  parentConfig:
    # host is auto-discovered from NLB
    grpcPort: 50051
    bootstrapPort: 8443
    service:
      type: LoadBalancer
---
# InfraProvider referenced by spec.providerRef above.
# `credentials.id: aws-credentials` points at the Secret the installer seeds
# from AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY / AWS_REGION env vars.
apiVersion: lattice.dev/v1alpha1
kind: InfraProvider
metadata:
  name: aws
  namespace: lattice-system
spec:
  type: aws
  region: us-west-2
  credentials:
    id: aws-credentials
    provider: lattice-local
  aws:
    sshKeyName: lattice-e2e

---
# ImageProvider referenced by LatticeService `imagePullSecrets: [default]` in
# the e2e service fixtures. `credentials.id: image-registry-credentials` points
# at the dockerconfigjson Secret the installer seeds from
# `--registry-credentials-file` or `GHCR_USER`/`GHCR_TOKEN` env vars.
apiVersion: lattice.dev/v1alpha1
kind: ImageProvider
metadata:
  name: default
  namespace: lattice-system
spec:
  type: ghcr
  registry: ghcr.io
  credentials:
    id: image-registry-credentials
    provider: lattice-local
