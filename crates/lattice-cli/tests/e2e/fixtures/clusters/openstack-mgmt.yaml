# OpenStack management cluster for E2E testing
# Uses CAPO (Cluster API Provider OpenStack) with OVH or similar
apiVersion: lattice.dev/v1alpha1
kind: LatticeCluster
metadata:
  name: e2e-mgmt
spec:
  latticeImage: "ghcr.io/evan-hines-js/lattice:latest"
  monitoring:
    enabled: true
    ha: false
  backups:
    enabled: false
  providerRef: openstack
  provider:
    kubernetes:
      version: "1.32.0"
      bootstrap: kubeadm
      certSANs:
        - "127.0.0.1"
        - "localhost"
    config:
      openstack:
        externalNetwork: "Ext-Net"
        imageName: "Ubuntu 22.04"
        sshKeyName: "lattice-e2e"
        cloudName: "openstack"
        dnsNameservers:
          - "8.8.8.8"
          - "8.8.4.4"
  nodes:
    controlPlane:
      replicas: 1
      instanceType:
        name: b2-30
      rootVolume:
        sizeGb: 50
    workerPools:
      default:
        replicas: 1
        instanceType:
          name: b2-15
        rootVolume:
          sizeGb: 50
  parentConfig:
    # host is auto-discovered from Octavia LB
    grpcPort: 50051
    bootstrapPort: 8443
    service:
      type: LoadBalancer
---
# InfraProvider referenced by spec.providerRef above.
# `credentials.id: openstack-cloud-config` points at the clouds.yaml Secret the
# installer seeds from OS_*/OPENSTACK_* env vars.
apiVersion: lattice.dev/v1alpha1
kind: InfraProvider
metadata:
  name: openstack
  namespace: lattice-system
spec:
  type: openstack
  credentials:
    id: openstack-cloud-config
    provider: lattice-local
  openstack:
    authUrl: "https://auth.cloud.ovh.net/v3"

---
# ImageProvider referenced by LatticeService `imagePullSecrets: [default]` in
# the e2e service fixtures. `credentials.id: image-registry-credentials` points
# at the dockerconfigjson Secret the installer seeds from
# `--registry-credentials-file` or `GHCR_USER`/`GHCR_TOKEN` env vars.
apiVersion: lattice.dev/v1alpha1
kind: ImageProvider
metadata:
  name: default
  namespace: lattice-system
spec:
  type: ghcr
  registry: ghcr.io
  credentials:
    id: image-registry-credentials
    provider: lattice-local
