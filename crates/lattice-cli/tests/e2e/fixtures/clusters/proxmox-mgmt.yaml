# Proxmox management cluster for E2E testing
apiVersion: lattice.dev/v1alpha1
kind: LatticeCluster
metadata:
  name: e2e-mgmt
spec:
  latticeImage: "ghcr.io/evan-hines-js/lattice:latest"
  monitoring:
    enabled: false
  backups:
    enabled: false
  providerRef: proxmox
  provider:
    kubernetes:
      version: "1.32.0"
      bootstrap: kubeadm
    config:
      proxmox:
        sshAuthorizedKeys:
          - "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAID1f8eVKp5YCAtis77YO/oHhWvzAiimDzlDqhtD+85YR evan.hines.dev@gmail.com"
        sourceNode: "poweredge-lg"
        templateId: 9000
        # kube-vip VIP for K8s API server
        # IP ranges are offset from homelab (10.0.0.100-105, .200/28) so both
        # can run on the same Proxmox host simultaneously.
        controlPlaneEndpoint: "10.0.0.150"
        bridge: "vmbr0"
        # Node IPs assigned by CAPMOX (extra headroom for failed test cleanup)
        ipv4Pool:
          range: "10.0.0.151-155/24"
          gateway: "10.0.0.1"
        dnsServers:
          - "10.0.0.1"
        virtualIpNetworkInterface: "ens18"
        lbCidr: "10.0.0.240/28"
        # Additional NICs for direct L2 reachability to workload cluster networks.
        # Istio east-west gateway needs direct connectivity (no NAT) for mTLS.
        # Each network needs its own IP pool (CAPMOX requirement).
        additionalNetworks:
          - bridge: "vmbr1"
            ipv4Pool:
              range: "10.0.1.241-250/24"
              gateway: "10.0.1.1"
          - bridge: "vmbr2"
            ipv4Pool:
              range: "10.0.2.241-250/24"
              gateway: "10.0.2.1"
  registryMirrors:
    - upstream: docker.io
      mirror: "http://10.0.0.131:5555"
    - upstream: ghcr.io
      mirror: "http://10.0.0.131:5556"
  nodes:
    controlPlane:
      replicas: 1
      instanceType:
        cores: 16
        memoryGib: 32
        diskGib: 50
    workerPools:
      default:
        replicas: 1
        instanceType:
          cores: 16
          memoryGib: 32
          diskGib: 100
  parentConfig:
    grpcPort: 50051
    bootstrapPort: 8443
    service:
      type: LoadBalancer
---
# InfraProvider referenced by spec.providerRef above.
# `credentials.id: proxmox-credentials` points at the Secret the installer
# seeds from PROXMOX_URL / PROXMOX_TOKEN / PROXMOX_SECRET env vars.
apiVersion: lattice.dev/v1alpha1
kind: InfraProvider
metadata:
  name: proxmox
  namespace: lattice-system
spec:
  type: proxmox
  credentials:
    id: proxmox-credentials
    provider: lattice-local
  proxmox:
    serverUrl: "https://10.0.0.97:8006"

---
# ImageProvider referenced by LatticeService `imagePullSecrets: [default]` in
# the e2e service fixtures. `credentials.id: image-registry-credentials` points
# at the dockerconfigjson Secret the installer seeds from
# `--registry-credentials-file` or `GHCR_USER`/`GHCR_TOKEN` env vars.
apiVersion: lattice.dev/v1alpha1
kind: ImageProvider
metadata:
  name: default
  namespace: lattice-system
spec:
  type: ghcr
  registry: ghcr.io
  credentials:
    id: image-registry-credentials
    provider: lattice-local
