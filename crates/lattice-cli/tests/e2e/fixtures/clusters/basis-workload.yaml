# Basis workload cluster for E2E testing
apiVersion: lattice.dev/v1alpha1
kind: LatticeCluster
metadata:
  name: e2e-workload
  labels:
    lattice.dev/environment: e2e-test
    lattice.dev/region: basis
spec:
  latticeImage: "ghcr.io/evan-hines-js/lattice:latest"
  monitoring:
    enabled: true
    ha: false
  backups:
    enabled: false
  storage: true
  providerRef: basis
  provider:
    kubernetes:
      version: "1.32.0"
      bootstrap: rke2
    config:
      basis:
        # Workload cluster — cell-public pool (apiserver VIP + Cilium
        # LB Service block). LB IPs aren't reachable from outside the
        # cell. External traffic enters via the root cluster's
        # cell-public ingress.
        externalIpPool: cell-public
  registryMirrors:
    - upstream: docker.io
      mirror: "http://10.0.0.131:5555"
    - upstream: ghcr.io
      mirror: "http://10.0.0.131:5556"
  nodes:
    controlPlane:
      replicas: 1
      instanceType:
        cores: 16
        memoryGib: 32
        diskGib: 50
      placement:
        prefers:
          - { key: tier, value: fast, weight: 100 }
    workerPools:
      default:
        replicas: 2
        instanceType:
          cores: 16
          memoryGib: 32
          diskGib: 100
          # One raw 50 GiB data disk per worker, consumed by the Rook
          # install test as OSD-backed storage. Basis attaches it as
          # /dev/vdc; rook-ceph claims it via the cluster's deviceFilter.
          dataDiskGibs: [50]
        placement:
          requires:
            - { key: tier, values: [slow] }
