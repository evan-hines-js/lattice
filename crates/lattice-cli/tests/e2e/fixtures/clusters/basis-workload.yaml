# Basis workload cluster for E2E testing
apiVersion: lattice.dev/v1alpha1
kind: LatticeCluster
metadata:
  name: e2e-workload
  labels:
    lattice.dev/environment: e2e-test
    lattice.dev/region: basis
spec:
  latticeImage: "ghcr.io/evan-hines-js/lattice:latest"
  monitoring:
    enabled: true
    ha: false
  backups:
    enabled: false
  providerRef: basis
  provider:
    kubernetes:
      version: "1.32.0"
      bootstrap: rke2
    config:
      basis:
        ipv4Pool: "default"
        # Cilium LB-IPAM range. Outside basis's pool and distinct per
        # fixture so mgmt/workload/workload2 coexist on one L2.
        lbCidr: "10.0.0.201/32"
  registryMirrors:
    - upstream: docker.io
      mirror: "http://10.0.0.131:5555"
    - upstream: ghcr.io
      mirror: "http://10.0.0.131:5556"
  nodes:
    controlPlane:
      replicas: 1
      instanceType:
        cores: 4
        memoryGib: 8
        diskGib: 40
    workerPools:
      default:
        replicas: 2
        instanceType:
          cores: 4
          memoryGib: 8
          diskGib: 80
