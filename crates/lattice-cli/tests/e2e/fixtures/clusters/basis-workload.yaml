# Basis workload cluster for E2E testing
apiVersion: lattice.dev/v1alpha1
kind: LatticeCluster
metadata:
  name: e2e-workload
  labels:
    lattice.dev/environment: e2e-test
    lattice.dev/region: basis
spec:
  latticeImage: "ghcr.io/evan-hines-js/lattice:latest"
  monitoring:
    enabled: true
    ha: false
  backups:
    enabled: false
  providerRef: basis
  provider:
    kubernetes:
      version: "1.32.0"
      bootstrap: rke2
    config:
      basis:
        ipv4Pool: "default"
        # Cilium LB-IPAM range. Outside basis's VM/VIP pools, disjoint
        # from mgmt (.176/28) and workload2 (.144/28). /28 = 16 IPs.
        lbCidr: "10.0.0.160/28"
  registryMirrors:
    - upstream: docker.io
      mirror: "http://10.0.0.131:5555"
    - upstream: ghcr.io
      mirror: "http://10.0.0.131:5556"
  nodes:
    controlPlane:
      replicas: 1
      instanceType:
        cores: 16
        memoryGib: 32
        diskGib: 50
    workerPools:
      default:
        replicas: 2
        instanceType:
          cores: 16
          memoryGib: 32
          diskGib: 100
