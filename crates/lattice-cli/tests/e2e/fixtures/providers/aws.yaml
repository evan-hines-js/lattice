# AWS InfraProvider for E2E testing
# Credentials are loaded from AWS_* environment variables
apiVersion: lattice.dev/v1alpha1
kind: InfraProvider
metadata:
  name: aws
spec:
  providerType: aws
  region: us-east-1
  credentials:
    id: aws-credentials
    provider: lattice-local
  aws:
    sshKeyName: lattice-e2e
  labels:
    environment: e2e
