# Proxmox InfraProvider for E2E testing
# Credentials are loaded from PROXMOX_* environment variables
apiVersion: lattice.dev/v1alpha1
kind: InfraProvider
metadata:
  name: proxmox
spec:
  providerType: proxmox
  credentials:
    id: proxmox-credentials
    provider: lattice-local
  proxmox:
    endpoint: "${PROXMOX_URL}"
    allowInsecure: true
  labels:
    environment: e2e
