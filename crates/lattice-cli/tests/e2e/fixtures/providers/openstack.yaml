# OpenStack InfraProvider for E2E testing
# Credentials are loaded from OS_* environment variables
apiVersion: lattice.dev/v1alpha1
kind: InfraProvider
metadata:
  name: openstack
spec:
  providerType: openstack
  credentials:
    type: secret
    id: openstack-credentials
    params:
      provider: lattice-local
  openstack:
    authUrl: "${OS_AUTH_URL}"
    region: "${OS_REGION_NAME}"
  labels:
    environment: e2e
